<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BellinaGrigia — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Sans+KR:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #f4f3f1; padding: 32px; }
  h1.title { font-size: 15px; letter-spacing: .2em; text-transform: uppercase; margin-bottom: 4px; color: #211f1d; }
  p.note { font-size: 12px; color: #5c5854; margin-bottom: 20px; }
  .hero { position: relative; aspect-ratio: 16/8; display: flex; align-items: center; justify-content: center; overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(255,255,255,.14) 0%, transparent 40%),
      radial-gradient(ellipse at 75% 30%, rgba(255,255,255,.10) 0%, transparent 45%),
      linear-gradient(160deg, #1c1a18 0%, #3d3a36 55%, #6a645d 100%); }
  .hero::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.35); }
  .inner { position: relative; z-index: 1; text-align: center; color: #fff; max-width: 620px; padding: 24px; }
  .badge { display: inline-block; border: 1px solid rgba(255,255,255,.5); padding: 4px 12px; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; margin-bottom: 16px; }
  h2 { font-family: 'Marcellus', serif; font-weight: 400; font-size: 42px; line-height: 1.15; }
  .sub { margin-top: 14px; font-size: 14.5px; color: rgba(255,255,255,.85); }
  .ctas { margin-top: 26px; display: flex; gap: 12px; justify-content: center; }
  .btn { padding: 12px 30px; font-size: 12.5px; letter-spacing: .15em; text-transform: uppercase; text-decoration: none; }
  .btn-w { background: #fff; color: #211f1d; }
  .btn-o { border: 1px solid rgba(255,255,255,.6); color: #fff; }
</style>
</head>
<body>
  <h1 class="title">Hero</h1>
  <p class="note">배경: 흑백 필름톤 슬로우모션 영상(0.6x) → 포스터 이미지 → 브랜드 그라데이션 순 폴백. 오버레이 black 35%.</p>
  <div class="hero">
    <div class="inner">
      <span class="badge">Coming Soon</span>
      <h2>A New Lifestyle, Born in Dubai</h2>
      <p class="sub">Be the first to experience our world — fashion, parties and fragrance.</p>
      <div class="ctas"><a class="btn btn-w" href="#">Join the Waitlist</a><a class="btn btn-o" href="#">Discover the Brand</a></div>
    </div>
  </div>
</body>
</html>
