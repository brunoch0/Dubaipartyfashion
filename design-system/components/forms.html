<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BellinaGrigia — Forms</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #f4f3f1; color: #211f1d; padding: 32px; }
  h1 { font-size: 15px; letter-spacing: .2em; text-transform: uppercase; margin-bottom: 4px; }
  p.note { font-size: 12px; color: #5c5854; margin-bottom: 24px; }
  .panel { border: 1px solid #dcd9d5; background: #fff; padding: 24px; max-width: 560px; margin-bottom: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  label { display: block; font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: #5c5854; margin-bottom: 5px; }
  input, select { width: 100%; border: 1px solid #dcd9d5; background: #fff; padding: 11px 12px; font-size: 13.5px; font-family: inherit; outline: none; border-radius: 0; }
  input:focus { border-color: #211f1d; }
  input.error { border-color: #a33; }
  .err-msg { font-size: 11px; color: #a33; margin-top: 4px; }
  .privacy { font-size: 11px; color: #94908b; margin-top: 14px; }
  .btn { padding: 12px 32px; font-size: 13px; letter-spacing: .15em; text-transform: uppercase; background: #211f1d; color: #fff; border: 0; margin-top: 16px; cursor: pointer; }
  .success { border: 1px solid #dcd9d5; background: #fff; padding: 28px; text-align: center; max-width: 560px; }
  .success p { font-family: 'Marcellus', serif; font-size: 18px; }
</style>
</head>
<body>
  <h1>Forms — Waitlist / RSVP</h1>
  <p class="note">라운딩 0, 포커스 시 보더만 잉크색으로. 인라인 에러 + 개인정보 안내 문구 슬롯(다국어).</p>
  <div class="panel">
    <div class="grid2">
      <div><label>Name *</label><input value="Amira K."></div>
      <div><label>Email *</label><input class="error" value="amira@"><div class="err-msg">올바른 이메일을 입력해주세요.</div></div>
    </div>
    <div style="margin-top:16px"><label>Guests</label><select><option>2</option></select></div>
    <button class="btn">Join</button>
    <p class="privacy">제출 시 개인정보 처리방침에 동의하는 것으로 간주됩니다.</p>
  </div>
  <div class="success"><p>You're on the list. We'll be in touch soon.</p></div>
</body>
</html>
